<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f12" />
    <meta name="description" content="Alpha Zone Labs business platform and custom web app discovery form." />
    <title>Get a Quote | Alpha Zone Labs</title>
    <link rel="icon" type="image/png" href="./alpha-zone-labs-logo.png" />
    <script type="module" crossorigin src="./assets/improve-D1yjsLd7.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/style-C3Ng41W4.js">
    <link rel="stylesheet" crossorigin href="./assets/style-DNkn_s8C.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="brand-bar">
        <img src="./alpha-zone-labs-logo.png" alt="Alpha Zone Labs" class="brand-logo" />
        <div>
          <strong>Alpha Zone Labs</strong>
          <span>Custom systems discovery</span>
        </div>
      </header>

      <form id="quoteForm" class="wizard-card" novalidate>
        <div id="wizard"></div>
      </form>
    </main>

    <div id="thankYou" class="thank-you-overlay" role="dialog" aria-modal="true" aria-labelledby="thankYouTitle" hidden>
      <section class="thank-you-card">
        <div class="success-mark" aria-hidden="true">✓</div>
        <p class="eyebrow">Submission received</p>
        <h1 id="thankYouTitle">Thank you.</h1>
        <p>We sent a confirmation to your email. Someone from the Alpha Zone Labs team will review your responses and get back with you.</p>
        <a class="button primary thank-you-close" href="https://alphazonelabs.com/">Close and return home</a>
      </section>
    </div>

    <footer id="wizardFooter" class="wizard-footer">
      <div class="footer-inner">
        <div class="progress-meta">
          <span id="stepLabel">Step 1</span>
          <span id="progressLabel">0%</span>
        </div>
        <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
        <div class="button-row">
          <button id="backButton" class="button secondary" type="button">Back</button>
          <button id="nextButton" class="button primary" type="button">Continue</button>
        </div>
        <p id="errorMessage" class="error-message" aria-live="polite"></p>
      </div>
    </footer>

    <iframe name="quoteSubmissionFrame" id="quoteSubmissionFrame" hidden></iframe>
    <script src="./enhancements.js"></script>
  </body>
</html>
